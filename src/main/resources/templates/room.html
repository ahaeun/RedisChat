<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title th:text="${room.name} + ' - chat'">채팅방</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 0 auto; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 16px; margin: 0; flex: 1; }
        header a { color: #4a7dff; text-decoration: none; font-size: 13px; }
        .pcount { background: #f1f3f5; color: #555; font-size: 12px; padding: 2px 8px; border-radius: 999px; }
        #log { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; gap: 6px; align-items: flex-end; }
        .msg.me { justify-content: flex-end; }
        .sender { font-size: 11px; color: #888; margin-right: 6px; align-self: center; }
        .bubble { background: #f1f3f5; padding: 8px 12px; border-radius: 14px; max-width: 70%; word-break: break-word; }
        .msg.me .bubble { background: #4a7dff; color: white; }
        .unread { font-size: 11px; color: #ff5757; min-width: 12px; text-align: right; }
        .system { font-size: 12px; color: #999; text-align: center; padding: 4px 0; }
        form { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #eee; }
        form input { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; }
        form button { padding: 8px 14px; border: 0; border-radius: 6px; background: #4a7dff; color: white; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <a href="/rooms">← 목록</a>
    <h1 th:text="${room.name}">방 이름</h1>
    <span class="pcount">👤 <span id="pcount">0</span></span>
</header>

<div id="log">
    <div class="msg" th:each="m : ${history}"
         th:classappend="${m.sender == nickname} ? ' me' : ''"
         th:attr="data-msg-id=${m.id}">
        <span class="sender" th:if="${m.sender != nickname}" th:text="${m.sender}">sender</span>
        <span class="unread" th:if="${m.unreadCount > 0}" th:text="${m.unreadCount}">0</span>
        <div class="bubble" th:text="${m.content}">content</div>
    </div>
</div>

<form id="send">
    <input id="content" autocomplete="off" placeholder="메시지를 입력하세요" autofocus/>
    <button type="submit">전송</button>
</form>

<script th:inline="javascript">
    const ROOM_ID = /*[[${room.id}]]*/ 'r0';
    const ME = /*[[${nickname}]]*/ 'me';
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="/js/room.js"></script>
</body>
</html>
